<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: #1a1a18;
      --text-muted: #555551;
      --text-faint: #8a8a85;
      --border: rgba(0,0,0,0.10);
      --bg: #faf9f6;
      --serif: 'EB Garamond', Georgia, serif;
    }

    body {
      font-family: var(--serif);
      font-size: 18px;
      line-height: 1.75;
      color: var(--text);
      background: var(--bg);
      max-width: 820px;
      margin: 0 auto;
      padding: 60px 28px 100px;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 400;
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .projects { display: flex; flex-direction: column; }

    .project {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }

    .project:first-child { border-top: 1px solid var(--border); }

    .project-title {
      font-size: 1.1rem;
      font-weight: 500;
      line-height: 1.35;
      color: var(--text);
    }
  </style>
</head>
<body>

  <h1 class="page-title">Projects</h1>

  <div class="projects">
  </div>

</body>
</html>
